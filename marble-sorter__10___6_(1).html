<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Marble Sorter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#EDE5D8;
    font-family:'Fredoka',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none}
  canvas{display:block}
  #win-screen{position:absolute;inset:0;z-index:100;background:rgba(180,165,145,0.92);
    display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px}
  #win-screen.show{display:flex}
  #win-screen h1{font-size:48px;color:#8B6914;text-shadow:0 0 30px rgba(139,105,20,0.5),0 4px 0 #6B5010;animation:wp 1s ease-in-out infinite alternate}
  #win-screen p{color:#5A4A38;font-size:18px;font-family:'Fredoka',sans-serif}
  #win-screen button{padding:14px 40px;border-radius:30px;border:none;
    background:linear-gradient(135deg,#4EE68C,#36C76E);color:white;font-size:20px;
    font-weight:700;font-family:'Fredoka',sans-serif;cursor:pointer;box-shadow:0 6px 20px rgba(78,230,140,0.4);transition:transform .15s}
  #win-screen button:active{transform:scale(.92)}
  @keyframes wp{from{transform:scale(1)}to{transform:scale(1.05)}}

  /* === LEVEL SELECT === */
  #level-screen{position:absolute;inset:0;z-index:90;
    background:linear-gradient(170deg,#EDE5D8 0%,#E0D4C0 40%,#D4C4AA 100%);
    display:flex;flex-direction:column;align-items:center;padding:0;overflow-y:auto;
    transition:opacity 0.4s ease}
  #level-screen.hidden{display:none}
  #level-screen .ls-header{
    width:100%;text-align:center;padding:32px 20px 16px;
    background:linear-gradient(180deg,rgba(139,105,20,0.08) 0%,transparent 100%)}
  #level-screen .ls-title{
    font-size:38px;font-weight:700;color:#8B6914;
    text-shadow:0 3px 0 #C4A84D,0 6px 15px rgba(139,105,20,0.2);
    letter-spacing:1px;margin-bottom:4px}
  #level-screen .ls-sub{font-size:15px;color:#9C8A70;font-weight:400}
  #level-screen .ls-grid{
    display:grid;grid-template-columns:repeat(3,1fr);gap:14px;
    padding:20px 24px 100px;max-width:420px;width:100%}
  .level-btn{
    position:relative;aspect-ratio:1;border:none;border-radius:18px;cursor:pointer;
    font-family:'Fredoka',sans-serif;font-weight:700;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    transition:transform 0.18s cubic-bezier(.34,1.56,.64,1),box-shadow 0.18s;
    -webkit-tap-highlight-color:transparent}
  .level-btn:hover{transform:scale(1.08)}
  .level-btn:active{transform:scale(0.94)}
  .level-btn .lb-num{font-size:28px;line-height:1;color:white;text-shadow:0 2px 0 rgba(0,0,0,0.15)}
  .level-btn .lb-stars{font-size:11px;letter-spacing:1px;opacity:0.85}
  .level-btn.locked{opacity:0.45;cursor:default;filter:grayscale(0.6)}
  .level-btn.locked:hover{transform:none}
  .level-btn .lb-lock{font-size:24px;opacity:0.7}
  @keyframes levelPop{
    0%{transform:scale(0) rotate(-8deg);opacity:0}
    60%{transform:scale(1.1) rotate(2deg);opacity:1}
    100%{transform:scale(1) rotate(0deg);opacity:1}
  }
  .level-btn{animation:levelPop 0.4s cubic-bezier(.34,1.56,.64,1) both}
  #level-screen .ls-back-row{
    position:fixed;bottom:0;left:0;right:0;padding:16px;
    display:flex;justify-content:center;
    background:linear-gradient(0deg,#D4C4AA 0%,transparent 100%);pointer-events:none}
  #level-screen .ls-back-row button{pointer-events:auto}
  #cal-toggle{position:absolute;top:10px;right:10px;z-index:30;
    width:40px;height:40px;border-radius:12px;border:none;
    background:rgba(160,130,100,0.8);color:white;font-size:20px;cursor:pointer;
    font-family:'Fredoka',sans-serif;backdrop-filter:blur(4px);}
  #cal-toggle:active{transform:scale(0.9);}
  #music-toggle{position:absolute;top:10px;right:58px;z-index:30;
    width:40px;height:40px;border-radius:12px;border:none;
    background:rgba(160,130,100,0.8);color:white;font-size:20px;cursor:pointer;
    font-family:'Fredoka',sans-serif;backdrop-filter:blur(4px);transition:opacity 0.2s;}
  #music-toggle:active{transform:scale(0.9);}
  #music-toggle.muted{opacity:0.5;}
  #cal-panel{
    display:none;position:absolute;top:55px;right:10px;z-index:30;
    background:rgba(240,230,218,0.95);border-radius:14px;padding:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.2);backdrop-filter:blur(8px);
    width:220px;max-height:80vh;overflow-y:auto;pointer-events:auto;
    font-family:'Fredoka',sans-serif;
  }
  #cal-panel h3{font-size:11px;color:#8B6914;margin:8px 0 4px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(139,105,20,0.2);padding-bottom:2px;}
  #cal-panel h3:first-child{margin-top:0;}
  #cal-panel .cr{display:flex;align-items:center;gap:6px;margin:3px 0;}
  #cal-panel .cr label{font-size:10px;color:#5A4A38;width:30px;text-align:right;}
  #cal-panel .cr input[type=range]{-webkit-appearance:none;flex:1;height:5px;background:rgba(90,74,56,0.15);border-radius:3px;outline:none;}
  #cal-panel .cr input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;
    border-radius:50%;background:#A08060;cursor:pointer;}
  #cal-panel .cr .cv{font-size:9px;color:#8B6914;width:28px;text-align:left;}
  #cal-panel .note{font-size:9px;color:rgba(90,74,56,0.5);margin-top:8px;text-align:center;}
</style>
</head>
<body>
<canvas id="game"></canvas>
<button id="music-toggle">&#9835;</button>
<audio id="bg-music" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
  <source src="music.ogg" type="audio/ogg">
</audio>
<button id="cal-toggle">&#9881;</button>
<div id="cal-panel">
  <h3>&#128230; Stock Grid</h3>
  <div class="cr"><label>X</label><input type="range" id="cs-dx" min="-100" max="100" value="-1"><span class="cv" id="cs-dx-v">-1</span></div>
  <div class="cr"><label>Y</label><input type="range" id="cs-dy" min="-200" max="400" value="199"><span class="cv" id="cs-dy-v">199</span></div>
  <div class="cr"><label>Size</label><input type="range" id="cs-s" min="50" max="150" value="89"><span class="cv" id="cs-s-v">89</span></div>
  <h3>&#128317; Funnel</h3>
  <div class="cr"><label>X</label><input type="range" id="cf-dx" min="-100" max="100" value="0"><span class="cv" id="cf-dx-v">0</span></div>
  <div class="cr"><label>Y</label><input type="range" id="cf-dy" min="-200" max="200" value="40"><span class="cv" id="cf-dy-v">40</span></div>
  <div class="cr"><label>W</label><input type="range" id="cf-sw" min="50" max="200" value="103"><span class="cv" id="cf-sw-v">103</span></div>
  <div class="cr"><label>H</label><input type="range" id="cf-sh" min="50" max="300" value="65"><span class="cv" id="cf-sh-v">65</span></div>
  <h3>&#128260; Belt</h3>
  <div class="cr"><label>X</label><input type="range" id="cb-dx" min="-100" max="100" value="0"><span class="cv" id="cb-dx-v">0</span></div>
  <div class="cr"><label>Y</label><input type="range" id="cb-dy" min="-100" max="200" value="24"><span class="cv" id="cb-dy-v">24</span></div>
  <div class="cr"><label>W</label><input type="range" id="cb-sw" min="50" max="200" value="80"><span class="cv" id="cb-sw-v">80</span></div>
  <div class="cr"><label>H</label><input type="range" id="cb-sh" min="30" max="200" value="133"><span class="cv" id="cb-sh-v">133</span></div>
  <h3>&#128229; Sort Area</h3>
  <div class="cr"><label>X</label><input type="range" id="co-dx" min="-100" max="100" value="0"><span class="cv" id="co-dx-v">0</span></div>
  <div class="cr"><label>Y</label><input type="range" id="co-dy" min="-100" max="200" value="-7"><span class="cv" id="co-dy-v">-7</span></div>
  <div class="cr"><label>Size</label><input type="range" id="co-s" min="50" max="150" value="96"><span class="cv" id="co-s-v">96</span></div>
  <div class="note">Red lines = funnel walls | Blue line = belt path<br>(visible when panel open)</div>
  <h3>&#127904; Marbles</h3>
  <div class="cr"><label>Size</label><input type="range" id="cm-s" min="30" max="200" value="137"><span class="cv" id="cm-s-v">137</span></div>
  <h3>&#9881; Gameplay</h3>
  <div class="cr"><label>Grav</label><input type="range" id="gravSlider" min="10" max="200" value="67"><span class="cv" id="gravVal">67</span></div>
  <div class="cr"><label>Speed</label><input type="range" id="beltSlider" min="3" max="60" value="31"><span class="cv" id="beltVal">31</span></div>
  <div class="cr"><label>Lip%</label><input type="range" id="lipSlider" min="0" max="80" value="28"><span class="cv" id="lipVal">28</span></div>
  <div class="cr"><label>MrbGap</label><input type="range" id="mrbGapSlider" min="50" max="150" value="75"><span class="cv" id="mrbGapVal">75</span></div>
</div>
<div id="level-screen">
  <div class="ls-header">
    <div class="ls-title">Marble Sorter</div>
    <div class="ls-sub">Pick a level to play</div>
  </div>
  <div class="ls-grid" id="ls-grid"></div>
</div>
<div id="win-screen"><h1>You Win!</h1><p id="win-msg">All marbles sorted perfectly!</p>
  <button onclick="goNextLevel()">Next Level</button>
  <button onclick="showLevelSelect()" style="background:linear-gradient(135deg,#E8A84C,#D4903A);box-shadow:0 6px 20px rgba(232,168,76,0.4);font-size:16px;padding:10px 30px">Level Select</button>
</div>
<script>
var canvas=document.getElementById('game');
var ctx=canvas.getContext('2d');
var W=0,H=0,S=1;
var L={};
var beltPath=[];
var stock=[],sortCols=[],particles=[],physMarbles=[],jumpers=[];
var obstacles=[];
var score=0,won=false,tick=0,hoverIdx=-1;
var audioCtx=null;

// === LEVEL SYSTEM ===
var currentLevel=0;
var LEVELS=[
  {name:'Getting Started',  colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Learn the basics', obstacles:[], bg:1},
  {name:'Double Trouble',   colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Avoid the cup!', obstacles:[{type:'cup',speed:0.6,yPct:0.45}], lockButtons:1, bg:2},
  {name:'Color Cascade',    colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Mind the gate!', obstacles:[{type:'gate',triggerCount:3,yPct:0.2}], bg:3},
  {name:'Trap Drop',        colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Watch the timing!', obstacles:[{type:'trapdoor',yPct:0.4,interval:1000}], bg:4},
  {name:'Marble Madness',   colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Stay focused', obstacles:[], bg:1},
  {name:'Sorted Chaos',     colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Organized mess', obstacles:[], bg:2},
  {name:'Belt Runner',      colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Keep it moving', obstacles:[], bg:3},
  {name:'Gravity Drop',     colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Let them fall', obstacles:[], bg:4},
  {name:'Precision',        colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Every marble counts', obstacles:[], bg:1},
  {name:'Grand Finale',     colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'The ultimate test', obstacles:[], bg:2},
  {name:'Encore',           colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'One more round', obstacles:[], bg:3},
  {name:'Masterclass',      colors:['pink','blue','green','yellow'], stockPerClr:6, mrbPerBox:9, sortCap:3, desc:'Prove yourself', obstacles:[], bg:4}
];
var levelStars=[];for(var li=0;li<LEVELS.length;li++)levelStars.push(0);
var unlockedLevels=4;
var gameActive=false;

var LEVEL_COLORS=[
  {bg:'linear-gradient(135deg,#FF9A9E,#E8706E)',shadow:'rgba(232,112,110,0.5)'},
  {bg:'linear-gradient(135deg,#89CFF0,#5BA3D9)',shadow:'rgba(91,163,217,0.5)'},
  {bg:'linear-gradient(135deg,#77DD77,#4EBF5E)',shadow:'rgba(78,191,94,0.5)'},
  {bg:'linear-gradient(135deg,#FFD966,#E8B84C)',shadow:'rgba(232,184,76,0.5)'},
  {bg:'linear-gradient(135deg,#C89CF2,#A66DD4)',shadow:'rgba(166,109,212,0.5)'},
  {bg:'linear-gradient(135deg,#FFB07C,#E88A5A)',shadow:'rgba(232,138,90,0.5)'},
  {bg:'linear-gradient(135deg,#87CEEB,#5EAED4)',shadow:'rgba(94,174,212,0.5)'},
  {bg:'linear-gradient(135deg,#F4A4C0,#D87EA0)',shadow:'rgba(216,126,160,0.5)'},
  {bg:'linear-gradient(135deg,#98D8A0,#6EBF7A)',shadow:'rgba(110,191,122,0.5)'},
  {bg:'linear-gradient(135deg,#F7C873,#D4A84C)',shadow:'rgba(212,168,76,0.5)'},
  {bg:'linear-gradient(135deg,#B8A9E2,#9080C4)',shadow:'rgba(144,128,196,0.5)'},
  {bg:'linear-gradient(135deg,#E8A4A4,#C87878)',shadow:'rgba(200,120,120,0.5)'}
];

function buildLevelGrid(){
  var grid=document.getElementById('ls-grid');
  grid.innerHTML='';
  for(var i=0;i<LEVELS.length;i++){
    var btn=document.createElement('button');
    btn.className='level-btn'+(i>=unlockedLevels?' locked':'');
    btn.style.animationDelay=(i*0.06)+'s';
    var clr=LEVEL_COLORS[i%LEVEL_COLORS.length];
    btn.style.background=clr.bg;
    btn.style.boxShadow='0 5px 18px '+clr.shadow;
    if(i<unlockedLevels){
      var stars='';
      var s=levelStars[i];
      for(var j=0;j<3;j++) stars+=(j<s?'★':'☆');
      btn.innerHTML='<span class="lb-num">'+(i+1)+'</span><span class="lb-stars">'+stars+'</span>';
      (function(idx){btn.addEventListener('click',function(){startLevel(idx);});})(i);
    }else{
      btn.innerHTML='<span class="lb-lock">🔒</span><span class="lb-num" style="font-size:16px;opacity:0.6">'+(i+1)+'</span>';
    }
    grid.appendChild(btn);
  }
}

function showLevelSelect(){
  gameActive=false;
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('level-screen').classList.remove('hidden');
  document.getElementById('cal-toggle').style.display='none';
  document.getElementById('music-toggle').style.display='none';
  buildLevelGrid();
}

function startLevel(idx){
  currentLevel=idx;
  gameActive=true;
  document.getElementById('level-screen').classList.add('hidden');
  document.getElementById('cal-toggle').style.display='';
  document.getElementById('music-toggle').style.display='';
  tryAutoStartMusic();
  initGame();
}

function goNextLevel(){
  if(currentLevel+1<LEVELS.length){
    startLevel(currentLevel+1);
  }else{
    showLevelSelect();
  }
}

var PHYS_GRAVITY=0.67,PHYS_DAMPING=0.997,PHYS_BOUNCE=0.45,PHYS_FRICTION=0.995;
var MARBLE_R_BASE=7;
var funnelWalls=[];
var BELT_SLOTS=30,beltSlots=[],beltOffset=0,BELT_SPEED=0.0031;

var gravSlider=document.getElementById('gravSlider');
var beltSlider=document.getElementById('beltSlider');
gravSlider.addEventListener('input',function(){PHYS_GRAVITY=parseInt(gravSlider.value)/100;document.getElementById('gravVal').textContent=gravSlider.value;});
beltSlider.addEventListener('input',function(){BELT_SPEED=parseInt(beltSlider.value)/10000;document.getElementById('beltVal').textContent=beltSlider.value;});
var LIP_PCT=0.28;
var lipSlider=document.getElementById('lipSlider');
lipSlider.addEventListener('input',function(){LIP_PCT=parseInt(lipSlider.value)/100;document.getElementById('lipVal').textContent=lipSlider.value;});
var MRB_GAP_FACTOR=0.75;
var mrbGapSlider=document.getElementById('mrbGapSlider');
mrbGapSlider.addEventListener('input',function(){MRB_GAP_FACTOR=parseInt(mrbGapSlider.value)/100;document.getElementById('mrbGapVal').textContent=mrbGapSlider.value;});

// === CALIBRATION ===
var cal={
  stock:{dx:-1,dy:199,s:0.89},
  funnel:{dx:0,dy:40,sw:1.03,sh:0.65},
  belt:{dx:0,dy:24,sw:0.80,sh:1.33},
  sort:{dx:0,dy:-7,s:0.96},
  marble:{s:1.37}
};
var calPanel=document.getElementById('cal-panel');
var calVisible=false;
function toggleCal(){calVisible=!calVisible;calPanel.style.display=calVisible?'block':'none';}
document.getElementById('cal-toggle').addEventListener('click',toggleCal);

function hookCal(id,obj,key,factor){
  var el=document.getElementById(id);
  var valEl=document.getElementById(id+'-v');
  if(!el)return;
  el.addEventListener('input',function(){
    obj[key]=parseFloat(el.value)*factor;
    valEl.textContent=el.value;
    computeLayout();
    updateStockPositions();
  });
}
hookCal('cs-dx',cal.stock,'dx',1);hookCal('cs-dy',cal.stock,'dy',1);hookCal('cs-s',cal.stock,'s',0.01);
hookCal('cf-dx',cal.funnel,'dx',1);hookCal('cf-dy',cal.funnel,'dy',1);hookCal('cf-sw',cal.funnel,'sw',0.01);hookCal('cf-sh',cal.funnel,'sh',0.01);
hookCal('cb-dx',cal.belt,'dx',1);hookCal('cb-dy',cal.belt,'dy',1);hookCal('cb-sw',cal.belt,'sw',0.01);hookCal('cb-sh',cal.belt,'sh',0.01);
hookCal('co-dx',cal.sort,'dx',1);hookCal('co-dy',cal.sort,'dy',1);hookCal('co-s',cal.sort,'s',0.01);
hookCal('cm-s',cal.marble,'s',0.01);

// === IMAGES ===
var imgs={};
var imgSrcs={
  box_blue:"box_blue.png",
  box_pink:"box_pink.png",
  box_yellow:"box_yellow.png",
  box_green:"box_green.png",
  box_empty:"box_empty.png",
  box_locked:"box_locked.png",
  marble_pink:"marble_pink.png",
  marble_blue:"marble_blue.png",
  marble_green:"marble_green.png",
  marble_orange:"marble_orange.png",
  sort_pink:"sort_pink.png",
  sort_blue:"sort_blue.png",
  sort_green:"sort_green.png",
  sort_yellow:"sort_yellow.png",
  belt_slot_empty:"belt_slot_empty.png"
};
imgSrcs.concept_bg_1='concept_bg_1.png';
imgSrcs.concept_bg_2='concept_bg_2.png';
imgSrcs.concept_bg_3='concept_bg_3.png';
imgSrcs.concept_bg_4='concept_bg_4.png';
var imgsLoaded=0,imgTotal=0;
function loadImages(cb){
  var keys=Object.keys(imgSrcs);imgTotal=keys.length;
  keys.forEach(function(k){
    var img=new Image();
    img.onload=function(){imgsLoaded++;if(imgsLoaded>=imgTotal)cb();};
    img.onerror=function(){console.warn('Failed to load:',k);imgsLoaded++;if(imgsLoaded>=imgTotal)cb();};
    img.src=imgSrcs[k];imgs[k]=img;
  });
}
var CLR_NAMES=['pink','blue','green','yellow'];
function boxImg(ci){return imgs['box_'+CLR_NAMES[ci]];}
function marbleImg(ci){return imgs['marble_'+['pink','blue','green','orange'][ci]];}
function sortImg(ci){return imgs['sort_'+CLR_NAMES[ci]];}

var COLORS=[
  {fill:'#FF4E8C',light:'#FF85B5',dark:'#C73068',glow:'rgba(255,78,140,0.5)'},
  {fill:'#4A9FFF',light:'#80C0FF',dark:'#2B6FCC',glow:'rgba(74,159,255,0.5)'},
  {fill:'#4EE68C',light:'#82F0B2',dark:'#2DB866',glow:'rgba(78,230,140,0.5)'},
  {fill:'#FFB545',light:'#FFD080',dark:'#CC8A1F',glow:'rgba(255,181,69,0.5)'}
];
var MRB_PER_BOX=9,SORT_CAP=3,STOCK_PER_CLR=6;
var SORT_PER_CLR=(MRB_PER_BOX*STOCK_PER_CLR)/SORT_CAP;
var SORT_VISIBLE_ROWS=4;

// === AUDIO ===
function ensureAudio(){if(!audioCtx){audioCtx=new(window.AudioContext||window.webkitAudioContext)();}}
function tone(freq,dur,type,vol,ramp){
  ensureAudio();var t=audioCtx.currentTime;
  var o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
  if(ramp)o.frequency.exponentialRampToValueAtTime(ramp,t+dur);
  g.gain.setValueAtTime(vol||0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.start(t);o.stop(t+dur);
}
var sfx={
  pop:function(){tone(800,0.12,'sine',0.13,300);},
  drop:function(){tone(400,0.08,'sine',0.04,200);},
  sort:function(){tone(600,0.1,'triangle',0.1);setTimeout(function(){tone(900,0.1,'triangle',0.1);},80);},
  complete:function(){[523,659,784,1047].forEach(function(f,i){setTimeout(function(){tone(f,0.2,'sine',0.1);},i*90);});},
  win:function(){[523,659,784,1047,1319,1568].forEach(function(f,i){setTimeout(function(){tone(f,0.25,'sine',0.12);},i*100);});}
};

// === BACKGROUND MUSIC ===
var bgMusic=document.getElementById('bg-music');
var musicBtn=document.getElementById('music-toggle');
var musicPlaying=false;
var musicStarted=false;
bgMusic.volume=0.35;

function toggleMusic(){
  if(!musicStarted){
    bgMusic.play().then(function(){
      musicPlaying=true;musicStarted=true;
      musicBtn.textContent='\u266B';
      musicBtn.classList.remove('muted');
    }).catch(function(){});
    return;
  }
  if(musicPlaying){

// === ROLLING MARBLE SOUNDS ===
var rollActive=false;

function spawnMarbleClick(intensity,speedFactor){
  if(!audioCtx)return;
  var t=audioCtx.currentTime;

  // --- Soft ceramic/glass tap — warm fundamental with gentle decay ---
  var o=audioCtx.createOscillator();
  var g=audioCtx.createGain();

  // Lower, warmer pitch range — like real glass marbles
  var baseFreq=800+Math.random()*1200;
  o.type='sine';
  o.frequency.setValueAtTime(baseFreq,t);
  // Gentle pitch slide down — satisfying "tock"
  o.frequency.exponentialRampToValueAtTime(baseFreq*0.6,t+0.12);

  // Soft volume with longer, smoother decay — ASMR quality
  var vol=0.015+intensity*0.025*(0.4+Math.random()*0.6);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(vol,t+0.003); // tiny soft attack
  g.gain.exponentialRampToValueAtTime(vol*0.3,t+0.06);
  g.gain.exponentialRampToValueAtTime(0.0001,t+0.15+Math.random()*0.1); // long tail

  o.connect(g);
  g.connect(audioCtx.destination);
  o.start(t);
  o.stop(t+0.3);

  // --- Crystalline harmonic overtone — bell-like shimmer ---
  if(Math.random()<0.5){
    var o2=audioCtx.createOscillator();
    var g2=audioCtx.createGain();
    // Harmonic at ~2.5x fundamental — glassy ring
    var harmFreq=baseFreq*2.2+Math.random()*800;
    o2.type='sine';
    o2.frequency.setValueAtTime(harmFreq,t+0.002);
    o2.frequency.exponentialRampToValueAtTime(harmFreq*0.7,t+0.18);

    var vol2=vol*0.25;
    g2.gain.setValueAtTime(0,t);
    g2.gain.linearRampToValueAtTime(vol2,t+0.005);
    g2.gain.exponentialRampToValueAtTime(0.0001,t+0.2+Math.random()*0.12);

    o2.connect(g2);
    g2.connect(audioCtx.destination);
    o2.start(t);
    o2.stop(t+0.4);
  }

  // --- Subtle low thud — gives physical weight/body ---
  if(Math.random()<0.3){
    var o3=audioCtx.createOscillator();
    var g3=audioCtx.createGain();
    o3.type='sine';
    o3.frequency.setValueAtTime(120+Math.random()*80,t);
    o3.frequency.exponentialRampToValueAtTime(50,t+0.08);
    var vol3=vol*0.5;
    g3.gain.setValueAtTime(vol3,t);
    g3.gain.exponentialRampToValueAtTime(0.0001,t+0.07);

    o3.connect(g3);
    g3.connect(audioCtx.destination);
    o3.start(t);
    o3.stop(t+0.1);
  }

  // --- Rare sparkle — high tinkling for ASMR texture ---
  if(Math.random()<0.15){
    var delay=0.03+Math.random()*0.06;
    var o4=audioCtx.createOscillator();
    var g4=audioCtx.createGain();
    o4.type='sine';
    var sparkleFreq=3500+Math.random()*3000;
    o4.frequency.setValueAtTime(sparkleFreq,t+delay);
    o4.frequency.exponentialRampToValueAtTime(sparkleFreq*0.5,t+delay+0.2);
    var vol4=vol*0.12;
    g4.gain.setValueAtTime(0,t+delay);
    g4.gain.linearRampToValueAtTime(vol4,t+delay+0.005);
    g4.gain.exponentialRampToValueAtTime(0.0001,t+delay+0.25);

    o4.connect(g4);
    g4.connect(audioCtx.destination);
    o4.start(t+delay);
    o4.stop(t+delay+0.35);
  }
}

function updateRollingSound(){
  if(!audioCtx)return;
  var count=physMarbles.length;
  if(count===0){rollActive=false;return;}

  // Compute average speed
  var avgSpeed=0;
  for(var i=0;i<count;i++){
    var m=physMarbles[i];
    avgSpeed+=Math.sqrt(m.vx*m.vx+m.vy*m.vy);
  }
  avgSpeed/=count;

  var speedFactor=Math.min(avgSpeed/(5*S),1.0);
  var countFactor=Math.min(count/8,1.0);

  // Skip if marbles are barely moving
  if(speedFactor<0.05)return;

  // Click rate: gentler spacing — not too dense, keep it pleasant
  // Range: ~every 10 frames (sparse) to every 2 frames (busy)
  var clickInterval=Math.max(2,Math.round(10-8*countFactor*speedFactor));

  if(tick%clickInterval===0){
    spawnMarbleClick(countFactor*speedFactor,speedFactor);
  }

  // Gentle extra taps when many marbles — marble-on-marble contact
  if(count>3&&speedFactor>0.2&&Math.random()<countFactor*speedFactor*0.15){
    spawnMarbleClick(countFactor*speedFactor*0.5,speedFactor);
  }
}

// === PARTICLES ===
function spawnBurst(x,y,color,n){n=n||12;for(var i=0;i<n;i++){var a=Math.PI*2*i/n+Math.random()*0.5,sp=2+Math.random()*4;particles.push({x:x,y:y,vx:Math.cos(a)*sp*S,vy:Math.sin(a)*sp*S,r:(2+Math.random()*4)*S,color:color,life:1,decay:0.02+Math.random()*0.02,grav:false});}}
function spawnConfetti(x,y,n){n=n||40;for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=3+Math.random()*8;particles.push({x:x,y:y,vx:Math.cos(a)*sp*S,vy:Math.sin(a)*sp*S-5*S,r:(3+Math.random()*5)*S,color:COLORS[~~(Math.random()*4)].fill,life:1,decay:0.006+Math.random()*0.008,grav:true});}}
function tickParticles(){for(var i=particles.length-1;i>=0;i--){var p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav?0.2*S:0.08*S;p.life-=p.decay;p.r*=0.985;if(p.life<=0)particles.splice(i,1);}}
function drawParticles(){for(var i=0;i<particles.length;i++){var p=particles[i];ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.5,p.r),0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;}

// === LAYOUT ===
function computeLayout(){
  var cx=W/2;
  // STOCK
  var sCal=cal.stock;
  var cols=6,rows=4;
  var bg2=5*S*sCal.s;
  var bw=Math.floor((380*S*sCal.s-(cols-1)*bg2)/cols);
  var bh=bw;
  var gameW=cols*bw+(cols-1)*bg2;
  var stockCx=cx+sCal.dx*S;
  var stockLeft=stockCx-gameW/2;
  L.cx=cx;L.bw=bw;L.bh=bh;L.bg=bg2;
  L.cols=cols;L.rows=rows;
  L.gameW=gameW;L.gameLeft=stockLeft;L.gameRight=stockLeft+gameW;
  L.sx=stockLeft;L.sy=46*S+sCal.dy*S;

  // FUNNEL
  var fCal=cal.funnel;
  var funnelW=gameW*fCal.sw;
  var funnelCx=cx+fCal.dx*S;
  var funnelLeft=funnelCx-funnelW/2;
  var funnelRight=funnelCx+funnelW/2;
  var stockBot=L.sy+rows*(bh+bg2);
  L.funnelTop=stockBot+fCal.dy*S;
  L.funnelH=190*S*fCal.sh;
  L.funnelBot=L.funnelTop+L.funnelH;
  L.funnelLeft=funnelLeft;L.funnelRight=funnelRight;
  L.funnelCx=funnelCx;
  L.funnelOpenW=32*S*fCal.sw;
  L.funnelBendY=L.funnelTop+L.funnelH*0.65;

  funnelWalls=[];
  var exitL=funnelCx-L.funnelOpenW/2;var exitR=funnelCx+L.funnelOpenW/2;
  funnelWalls.push({x1:funnelLeft,y1:L.sy,x2:funnelLeft,y2:L.funnelBendY});
  funnelWalls.push({x1:funnelRight,y1:L.sy,x2:funnelRight,y2:L.funnelBendY});
  funnelWalls.push({x1:funnelLeft,y1:L.funnelBendY,x2:exitL,y2:L.funnelBot});
  funnelWalls.push({x1:funnelRight,y1:L.funnelBendY,x2:exitR,y2:L.funnelBot});
  funnelWalls.push({x1:0,y1:L.funnelBot,x2:exitL,y2:L.funnelBot});
  funnelWalls.push({x1:exitR,y1:L.funnelBot,x2:W,y2:L.funnelBot});
  funnelWalls.push({x1:exitL,y1:L.funnelBot,x2:exitR,y2:L.funnelBot,isPlug:true});

  // BELT
  var bCal=cal.belt;
  var beltW=gameW*bCal.sw;
  var beltCx=cx+bCal.dx*S;
  var beltLeft=beltCx-beltW/2;
  var beltTopY=L.funnelBot+14*S+bCal.dy*S;
  var beltGap=24*S*bCal.sh;
  var beltBotY=beltTopY+beltGap;
  var uR=beltGap/2;
  var beltInnerLeft=beltLeft+uR;var beltInnerRight=beltLeft+beltW-uR;
  L.beltTopY=beltTopY;L.beltBotY=beltBotY;
  L.beltLeft=beltLeft;L.beltRight=beltLeft+beltW;
  L.beltCx=beltCx;L.beltGap=beltGap;L.uR=uR;

  beltPath=[];var segs=200;
  var topLen=Math.max(1,beltInnerRight-beltInnerLeft);var botLen=topLen;
  var uLen=Math.PI*uR;var perim=topLen+botLen+2*uLen;
  for(var i=0;i<segs;i++){
    var d=(i/segs)*perim;var x,y,a;
    var s1=topLen,s2=s1+uLen,s3=s2+botLen;
    if(d<s1){x=beltInnerLeft+(d/topLen)*topLen;y=beltTopY;}
    else if(d<s2){a=((d-s1)/uLen)*Math.PI;x=beltInnerRight+Math.sin(a)*uR;y=beltTopY+uR-Math.cos(a)*uR;}
    else if(d<s3){x=beltInnerRight-((d-s2)/botLen)*botLen;y=beltBotY;}
    else{a=((d-s3)/uLen)*Math.PI;x=beltInnerLeft-Math.sin(a)*uR;y=beltBotY-uR+Math.cos(a)*uR;}
    beltPath.push({x:x,y:y});
  }

  // SORT
  var oCal=cal.sort;
  var sortW=gameW*oCal.s;
  var sortCx=cx+oCal.dx*S;
  L.sTop=beltBotY+16*S+oCal.dy*S;
  L.sBw=Math.floor((sortW-3*7*S*oCal.s)/4);
  L.sBh=32*S*oCal.s;L.sGap=3*S*oCal.s;L.sColGap=7*S*oCal.s;
  var stw=4*L.sBw+3*L.sColGap;
  L.sSx=sortCx-stw/2;

  L.sortBeltT=[];
  for(var c=0;c<4;c++){
    var colCx=L.sSx+c*(L.sBw+L.sColGap)+L.sBw/2;
    var best=0,bd=Infinity;
    for(var j=0;j<beltPath.length;j++){
      var dx2=beltPath[j].x-colCx,dy2=beltPath[j].y-L.beltBotY;
      var dist=dx2*dx2+dy2*dy2;if(dist<bd){bd=dist;best=j;}
    }
    L.sortBeltT.push(best/beltPath.length);
  }
}

function resize(){
  W=window.innerWidth;H=window.innerHeight;

  computeLayout();

}
function updateObstacleLayout(){
  for(var i=0;i<obstacles.length;i++){
    var ob=obstacles[i];
    if(ob.type==='cup'){
      ob.w=72*S;ob.h=50*S;ob.wallThick=4*S;
      var lvlDef=LEVELS[currentLevel].obstacles[i];
      var trackY=L.funnelTop+(L.funnelBendY-L.funnelTop)*(lvlDef.yPct||0.45);
      ob.y=trackY;
      var fLeft=L.funnelLeft+ob.w*0.1;
      var fRight=L.funnelRight-ob.w*0.1;
      ob.trackCx=(fLeft+fRight)/2;
      ob.trackHalfW=(fRight-fLeft-ob.w)/2;
    }
    if(ob.type==='gate'){
      var gyPct=ob.yPct;
      var gateY=L.funnelBendY+(L.funnelBot-L.funnelBendY)*gyPct;
      ob.pivotX=L.funnelCx;ob.pivotY=gateY;
      ob.barLen=(L.funnelBot-gateY)*1.12;
    }
    if(ob.type==='trapdoor'){
      var tdYPct=ob.yPct;
      var tdY=L.funnelTop+(L.funnelBendY-L.funnelTop)*tdYPct;
      var fW=L.funnelRight-L.funnelLeft;
      var cupW=fW*0.34;
      var cupH=55*S;
      var leftX=L.funnelLeft+cupW/2+6*S;
      var rightX=L.funnelRight-cupW/2-6*S;
      for(var ci=0;ci<ob.cups.length;ci++){
        var cup=ob.cups[ci];
        cup.y=tdY;cup.w=cupW;cup.h=cupH;cup.wallThick=4*S;
        cup.x=(cup.side==='left')?leftX:rightX;
      }
    }
  }
}
function updateStockPositions(){
  if(!stock||!stock.length)return;
  for(var i=0;i<stock.length;i++){
    var r=Math.floor(i/L.cols);var c=i%L.cols;
    stock[i].x=L.sx+c*(L.bw+L.bg);
    stock[i].y=L.sy+r*(L.bh+L.bg);
  }
}

// === BELT ===
function initBeltSlots(){beltSlots=[];for(var i=0;i<BELT_SLOTS;i++)beltSlots.push({marble:-1,arriveAnim:0});beltOffset=0;}
function getSlotPos(i){
  var t=((i/BELT_SLOTS)+beltOffset)%1;t=((t%1)+1)%1;
  var idx=t*beltPath.length;var i0=Math.floor(idx)%beltPath.length;var i1=(i0+1)%beltPath.length;var f=idx-Math.floor(idx);
  return{x:beltPath[i0].x+(beltPath[i1].x-beltPath[i0].x)*f,y:beltPath[i0].y+(beltPath[i1].y-beltPath[i0].y)*f};
}
function getSlotT(i){return((i/BELT_SLOTS)+beltOffset)%1;}
function getBeltEntryT(){
  var best=0,bd=Infinity;
  for(var i=0;i<beltPath.length;i++){var dx=beltPath[i].x-L.beltCx,dy=beltPath[i].y-L.beltTopY;var d2=dx*dx+dy*dy;if(d2<bd){bd=d2;best=i;}}
  return best/beltPath.length;
}

// === OBSTACLES ===
function getCupWalls(ob){
  var hw=ob.w/2;var left=ob.x-hw;var right=ob.x+hw;var top=ob.y;var bot=ob.y+ob.h;
  var walls=[
    {x1:left,y1:top,x2:left,y2:bot},    // left wall
    {x1:right,y1:top,x2:right,y2:bot}    // right wall
  ];
  if(!ob.released){
    walls.push({x1:left,y1:bot,x2:right,y2:bot}); // bottom — only when closed
  }
  return walls;
}
function updateObstacles(){
  for(var i=0;i<obstacles.length;i++){
    var ob=obstacles[i];
    if(ob.type==='cup'){
      if(ob.released)continue;
      // Smooth ping-pong movement
      ob.phase+=ob.speed*0.012*S;
      var t=Math.sin(ob.phase);
      var prevX=ob.x;
      ob.x=ob.trackCx+t*ob.trackHalfW;
      var dx=ob.x-prevX;
      // Push trapped marbles with the cup
      for(var j=0;j<ob.trapped.length;j++){
        ob.trapped[j].x+=dx;
      }
    }
    if(ob.type==='gate'){
      // Smooth rotation towards target angle
      var adiff=ob.targetAngle-ob.angle;
      if(Math.abs(adiff)>0.002){
        ob.angle+=adiff*0.08;
      } else {
        ob.angle=ob.targetAngle;
      }
      if(ob.switchT>0)ob.switchT=Math.max(0,ob.switchT-0.025);
    }
    if(ob.type==='trapdoor'){
      ob.timer++;
      var half=ob.interval/2;
      var leftOpen=(ob.timer%ob.interval)>=half;
      // Detect transition
      if(leftOpen!==ob.prevLeftOpen){
        ob.prevLeftOpen=leftOpen;
        ob.switchT=1.0;
        sfx.pop();
        // Release marbles from the cup that just opened, close the other
        for(var ci=0;ci<ob.cups.length;ci++){
          var cup=ob.cups[ci];
          var shouldOpen=(cup.side==='left')?leftOpen:!leftOpen;
          if(shouldOpen&&!cup.open){
            // This cup is opening — release trapped marbles
            cup.open=true;
            for(var mj=0;mj<cup.trapped.length;mj++){
              var m=cup.trapped[mj];
              m.inCup=false;
              m.vy=1*S+Math.random()*2*S;
              m.vx=(Math.random()-0.5)*2*S;
              spawnBurst(m.x,m.y,COLORS[m.ci].fill,4);
            }
            cup.trapped=[];
          } else if(!shouldOpen&&cup.open){
            // This cup is closing
            cup.open=false;
          }
        }
      }
      // Animate openT for smooth bottom transition
      for(var ci=0;ci<ob.cups.length;ci++){
        var cup=ob.cups[ci];
        var target=cup.open?1:0;
        cup.openT+=(target-cup.openT)*0.15;
        if(Math.abs(cup.openT-target)<0.01)cup.openT=target;
      }
      if(ob.switchT>0)ob.switchT=Math.max(0,ob.switchT-0.02);
    }
  }
}
function getObstacleWalls(){
  var walls=[];
  for(var i=0;i<obstacles.length;i++){
    var ob=obstacles[i];
    if(ob.type==='cup'&&!ob.released){
      var cw=getCupWalls(ob);
      for(var j=0;j<cw.length;j++)walls.push(cw[j]);
    }
    if(ob.type==='gate'){
      var endX=ob.pivotX+Math.sin(ob.angle)*ob.barLen;
      var endY=ob.pivotY+Math.cos(ob.angle)*ob.barLen;
      walls.push({x1:ob.pivotX,y1:ob.pivotY,x2:endX,y2:endY});
    }
    if(ob.type==='trapdoor'){
      for(var ci=0;ci<ob.cups.length;ci++){
        var cup=ob.cups[ci];
        var hw=cup.w/2;var left=cup.x-hw;var right=cup.x+hw;
        var top2=cup.y;var bot2=cup.y+cup.h;
        // Side walls always present
        walls.push({x1:left,y1:top2,x2:left,y2:bot2});
        walls.push({x1:right,y1:top2,x2:right,y2:bot2});
        // Bottom wall only when closed (openT < 0.5)
        if(cup.openT<0.5){
          // Bottom splits apart based on openT
          var split=cup.openT*2*hw*0.6;
          var midX=cup.x;
          walls.push({x1:left,y1:bot2,x2:midX-split,y2:bot2});
          walls.push({x1:midX+split,y1:bot2,x2:right,y2:bot2});
        }
      }
    }
  }
  return walls;
}
function checkCupTrapping(){
  for(var oi=0;oi<obstacles.length;oi++){
    var ob=obstacles[oi];
    if(ob.type==='cup'){
      if(ob.released)continue;
      var hw=ob.w/2;var left=ob.x-hw;var right=ob.x+hw;var top=ob.y;var bot=ob.y+ob.h;
      for(var mi=0;mi<physMarbles.length;mi++){
        var m=physMarbles[mi];
        if(m.inCup)continue;
        if(m.x>left+m.r*0.5&&m.x<right-m.r*0.5&&m.y>top+m.r&&m.y<bot){
          m.inCup=true;
          if(ob.trapped.indexOf(m)<0) ob.trapped.push(m);
        }
      }
    }
    if(ob.type==='trapdoor'){
      for(var ci=0;ci<ob.cups.length;ci++){
        var cup=ob.cups[ci];
        if(cup.open)continue; // open cups don't trap
        var hw2=cup.w/2;var left2=cup.x-hw2;var right2=cup.x+hw2;var top2=cup.y;var bot2=cup.y+cup.h;
        for(var mi=0;mi<physMarbles.length;mi++){
          var m=physMarbles[mi];
          if(m.inCup)continue;
          if(m.x>left2+m.r*0.5&&m.x<right2-m.r*0.5&&m.y>top2+m.r&&m.y<bot2){
            m.inCup=true;
            if(cup.trapped.indexOf(m)<0) cup.trapped.push(m);
          }
        }
      }
    }
  }
}

function releaseCupMarbles(){
  for(var oi=0;oi<obstacles.length;oi++){
    var ob=obstacles[oi];
    if(ob.type!=='cup')continue;
    ob.released=true;
    ob.releaseT=1.0; // animation timer for cup bottom opening
    // Free all trapped marbles
    for(var j=0;j<ob.trapped.length;j++){
      var m=ob.trapped[j];
      m.inCup=false;
      // Give a slight random nudge so they fall out
      m.vy=1*S+Math.random()*2*S;
      m.vx=(Math.random()-0.5)*2*S;
      spawnBurst(m.x,m.y,COLORS[m.ci].fill,4);
    }
    ob.trapped=[];
    sfx.pop();
  }
}

// === PHYSICS ===
function getMR(){return MARBLE_R_BASE*S*cal.marble.s;}
function circleLineCollide(cx2,cy2,r,x1,y1,x2,y2){
  var dx=x2-x1,dy=y2-y1;var len2=dx*dx+dy*dy;if(len2<0.001)return null;
  var t=((cx2-x1)*dx+(cy2-y1)*dy)/len2;t=Math.max(0,Math.min(1,t));
  var closestX=x1+t*dx,closestY=y1+t*dy;
  var distX=cx2-closestX,distY=cy2-closestY;
  var dist=Math.sqrt(distX*distX+distY*distY);
  if(dist<r&&dist>0.001){return{nx:distX/dist,ny:distY/dist,pen:r-dist};}
  return null;
}
function physicsStep(){
  var MR=getMR();var subSteps=3;
  for(var sub=0;sub<subSteps;sub++){
    for(var i=0;i<physMarbles.length;i++){var m=physMarbles[i];m.vy+=PHYS_GRAVITY*S/subSteps;m.vx*=PHYS_DAMPING;m.vy*=PHYS_DAMPING;m.x+=m.vx/subSteps;m.y+=m.vy/subSteps;}
    for(var i=0;i<physMarbles.length;i++){for(var j=i+1;j<physMarbles.length;j++){
      var a=physMarbles[i],b=physMarbles[j];var dx=b.x-a.x,dy=b.y-a.y;var dist=Math.sqrt(dx*dx+dy*dy);var minD=a.r+b.r;
      if(dist<minD&&dist>0.01){var nx=dx/dist,ny=dy/dist;var pen=(minD-dist)/2;
        a.x-=nx*pen;a.y-=ny*pen;b.x+=nx*pen;b.y+=ny*pen;
        var dvx=a.vx-b.vx,dvy=a.vy-b.vy;var dvn=dvx*nx+dvy*ny;
        if(dvn>0){a.vx-=dvn*nx*PHYS_BOUNCE;a.vy-=dvn*ny*PHYS_BOUNCE;b.vx+=dvn*nx*PHYS_BOUNCE;b.vy+=dvn*ny*PHYS_BOUNCE;}}
    }}
    for(var i=0;i<physMarbles.length;i++){var m=physMarbles[i];
      for(var w=0;w<funnelWalls.length;w++){var wall=funnelWalls[w];
        var col2=circleLineCollide(m.x,m.y,m.r,wall.x1,wall.y1,wall.x2,wall.y2);
        if(col2){m.x+=col2.nx*col2.pen;m.y+=col2.ny*col2.pen;
          var vn=m.vx*col2.nx+m.vy*col2.ny;
          if(vn<0){m.vx-=(1+PHYS_BOUNCE)*vn*col2.nx;m.vy-=(1+PHYS_BOUNCE)*vn*col2.ny;
            var tx=-col2.ny,ty=col2.nx;var vt=m.vx*tx+m.vy*ty;
            m.vx-=vt*(1-PHYS_FRICTION)*tx;m.vy-=vt*(1-PHYS_FRICTION)*ty;}}
      }
    }
    // Obstacle wall collisions (computed once per substep)
    var obWalls=getObstacleWalls();
    for(var i=0;i<physMarbles.length;i++){var m=physMarbles[i];
      for(var w=0;w<obWalls.length;w++){var wall=obWalls[w];
        var col2=circleLineCollide(m.x,m.y,m.r,wall.x1,wall.y1,wall.x2,wall.y2);
        if(col2){m.x+=col2.nx*col2.pen;m.y+=col2.ny*col2.pen;
          var vn=m.vx*col2.nx+m.vy*col2.ny;
          if(vn<0){m.vx-=(1+PHYS_BOUNCE)*vn*col2.nx;m.vy-=(1+PHYS_BOUNCE)*vn*col2.ny;
            var tx=-col2.ny,ty=col2.nx;var vt=m.vx*tx+m.vy*ty;
            m.vx-=vt*(1-PHYS_FRICTION)*tx;m.vy-=vt*(1-PHYS_FRICTION)*ty;}}
      }
    }
  }
  var exitY=L.funnelBot;var exitL2=L.funnelCx-L.funnelOpenW/2;var exitR2=L.funnelCx+L.funnelOpenW/2;
  for(var i=physMarbles.length-1;i>=0;i--){var m=physMarbles[i];
    if(m.inCup)continue; // trapped marbles never exit
    if(m.y+m.r>=exitY-3*S&&m.x>exitL2-m.r&&m.x<exitR2+m.r){
      var entryT=getBeltEntryT();var bestIdx=-1,bestDist=Infinity;
      for(var k=0;k<BELT_SLOTS;k++){if(beltSlots[k].marble>=0)continue;
        var st=getSlotT(k);var diff=Math.abs(st-entryT);diff=Math.min(diff,1-diff);
        if(diff<bestDist){bestDist=diff;bestIdx=k;}}
      if(bestIdx>=0&&bestDist<0.08){
        beltSlots[bestIdx].marble=m.ci;beltSlots[bestIdx].arriveAnim=0.6;
        sfx.drop();spawnBurst(m.x,m.y,COLORS[m.ci].fill,6);
        physMarbles.splice(i,1);
        // Count marble for gate obstacles
        for(var gi=0;gi<obstacles.length;gi++){
          var gate=obstacles[gi];
          if(gate.type!=='gate')continue;
          gate.counter++;
          if(gate.counter>=gate.triggerCount){
            gate.counter=0;
            gate.side*=-1;
            gate.targetAngle=(gate.side<0)?gate.angleLeft:gate.angleRight;
            gate.switchT=1.0;
            sfx.pop();
            spawnBurst(gate.pivotX,gate.pivotY,'#FFD700',12);
          }
        }
      }
    }
  }
}
// Snake order for 3x3 grid: top-left → top-right, right → left, left → right
var SNAKE_ORDER=[
  {r:0,c:0},{r:0,c:1},{r:0,c:2},
  {r:1,c:2},{r:1,c:1},{r:1,c:0},
  {r:2,c:0},{r:2,c:1},{r:2,c:2}
];

function spawnPhysMarbles(box){
  box.spawning=true;box.spawnIdx=0;
  var count=box.remaining;
  for(var idx=0;idx<count;idx++){(function(i,b){
    setTimeout(function(){if(b.remaining<=0)return;
      var si=SNAKE_ORDER[MRB_PER_BOX-b.remaining]; // current snake position
      b.remaining--;b.spawnIdx=MRB_PER_BOX-b.remaining;
      var MR=getMR();
      var mg=Math.min(14*S,L.bw/4.2);var mgY=mg*MRB_GAP_FACTOR;
      var mx=b.x+L.bw/2+(si.c-1)*mg;
      var my=b.y+L.bh/2+(si.r-1)*mgY-2*S;
      var vx=(Math.random()-0.5)*2*S;
      var vy=-(2+Math.random()*2)*S; // pop upward
      physMarbles.push({x:mx,y:my,vx:vx,vy:vy,ci:b.ci,r:MR,spawnT:1.0});
      sfx.drop();
      spawnBurst(mx,my,COLORS[b.ci].fill,4);
      if(b.remaining<=0){
        b.emptyT=1.0; // start empty transition
        setTimeout(function(){b.used=true;b.spawning=false;},300);
      }
    },i*120); // slightly slower for more satisfying rhythm
  })(idx,box);}
}

// === INIT ===
function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=~~(Math.random()*(i+1));var tmp=arr[i];arr[i]=arr[j];arr[j]=tmp;}}
function initGame(){

  computeLayout();initBeltSlots();

  stock=[];
  for(var r=0;r<L.rows;r++)for(var c=0;c<L.cols;c++){
    var isBottomRow=(r===L.rows-1);
    stock.push({ci:cl[r*L.cols+c],used:false,remaining:MRB_PER_BOX,spawning:false,spawnIdx:0,

  shuffle(allBoxes);
  sortCols=[];
  for(var c=0;c<4;c++){var col2=[];for(var r=0;r<SORT_PER_CLR;r++)col2.push(allBoxes[c*SORT_PER_CLR+r]);sortCols.push(col2);}
  // Insert lock buttons if level has them
  var lvl=LEVELS[currentLevel];

  for(var li2=0;li2<numLocks;li2++){

    var lockCol=Math.floor(Math.random()*4);
    var lockRow=2+Math.floor(Math.random()*4);
    lockRow=Math.min(lockRow,sortCols[lockCol].length);
    sortCols[lockCol].splice(lockRow,0,{type:'lock',ci:-1,filled:0,popT:0,vis:true,shineT:0,squishT:0,triggerT:0,triggered:false});
  }
  // Init obstacles from level data

        var barLen=(L.funnelBot-gateY)*1.12;

      if(def.type==='trapdoor'){

        var fW=L.funnelRight-L.funnelLeft;
        var cupW=fW*0.34;
        var cupH=55*S;
        var gap=fW*0.18;
        var leftX=L.funnelLeft+cupW/2+6*S;
        var rightX=L.funnelRight-cupW/2-6*S;
        obstacles.push({
          type:'trapdoor',
          yPct:tdYPct,

          timer:0,
          prevLeftOpen:false,
          switchT:0,
          cups:[
            {side:'left', x:leftX, y:tdY, w:cupW, h:cupH, wallThick:4*S, open:false, openT:0, trapped:[]},
            {side:'right',x:rightX,y:tdY, w:cupW, h:cupH, wallThick:4*S, open:true,  openT:1, trapped:[]}
          ]
        });
      }
    }
  }
}
function isBoxTappable(idx){
  var col=idx%L.cols;var bottomIdx=-1;
  for(var r=L.rows-1;r>=0;r--){var bi=r*L.cols+col;if(!stock[bi].used){bottomIdx=bi;break;}}
  if(idx!==bottomIdx)return false;
  if(stock[idx].spawning)return false;
  if(stock[idx].revealT>0)return false;
  return true;
}

// === INPUT ===
function handleTap(px,py){
  if(won||!gameActive)return;ensureAudio();
  for(var i=0;i<stock.length;i++){
    var b=stock[i];if(b.used||b.spawning||b.revealT>0)continue;
    if(px>=b.x&&px<=b.x+L.bw&&py>=b.y&&py<=b.y+L.bh){
      if(!isBoxTappable(i)){b.shakeT=0.5;return;}
      // Satisfying tap pop — box squishes then marbles start flying
      b.popT=1;
      sfx.pop();
      spawnBurst(b.x+L.bw/2,b.y+L.bh/2,COLORS[b.ci].fill,18);
      spawnPhysMarbles(b);
      return;
    }
  }
}
canvas.addEventListener('click',function(e){handleTap(e.clientX,e.clientY);});
canvas.addEventListener('touchstart',function(e){e.preventDefault();handleTap(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
document.getElementById('cal-panel').addEventListener('touchstart',function(e){e.stopPropagation();},{passive:false});
canvas.addEventListener('mousemove',function(e){
  hoverIdx=-1;
  if(!gameActive)return;
  for(var i=0;i<stock.length;i++){var b=stock[i];if(b.used||b.spawning||b.revealT>0)continue;
    if(!isBoxTappable(i))continue;
    if(e.clientX>=b.x&&e.clientX<=b.x+L.bw&&e.clientY>=b.y&&e.clientY<=b.y+L.bh){hoverIdx=i;break;}}
  canvas.style.cursor=hoverIdx>=0?'pointer':'default';
});

// === UPDATE ===
function getSortBoxY(ci,vi){return L.sTop+vi*(L.sBh+L.sGap);}
function update(){
  if(!gameActive)return;
  tick++;
  updateObstacles();
  physicsStep();
  checkCupTrapping();
  beltOffset=(beltOffset+BELT_SPEED*S)%1;
  for(var i=0;i<BELT_SLOTS;i++){if(beltSlots[i].arriveAnim>0)beltSlots[i].arriveAnim=Math.max(0,beltSlots[i].arriveAnim-0.025);}
  for(var si=0;si<BELT_SLOTS;si++){
    var slot=beltSlots[si];if(slot.marble<0)continue;var slotT=getSlotT(si);
    for(var c=0;c<4;c++){
      var col=sortCols[c];var tv=-1;
      for(var r=0;r<col.length;r++){if(col[r].vis){tv=r;break;}}
      if(tv<0||col[tv].ci!==slot.marble)continue;
      // Count in-flight jumpers already heading to this column's top box
      var inFlight=0;
      for(var j=0;j<jumpers.length;j++){if(jumpers[j].targetCol===c)inFlight++;}
      if(col[tv].filled+inFlight>=SORT_CAP)continue;
      var bt=L.sortBeltT[c];var diff=Math.abs(slotT-bt);var wdiff=Math.min(diff,1-diff);
      if(wdiff<0.015){
        var aj=false;for(var j=0;j<jumpers.length;j++){if(jumpers[j].slotIdx===si){aj=true;break;}}
        if(aj)continue;var pos=getSlotPos(si);
        var tSlot=col[tv].filled+inFlight;
        jumpers.push({ci:slot.marble,slotIdx:si,startX:pos.x,startY:pos.y,targetCol:c,targetSlot:tSlot,t:0});
        slot.marble=-1;break;
      }
    }
  }
  for(var i=jumpers.length-1;i>=0;i--){
    var j=jumpers[i];j.t+=0.04;
    if(j.t>=1){
      var col=sortCols[j.targetCol];var tv=-1;
      for(var r=0;r<col.length;r++){if(col[r].vis){tv=r;break;}}
      if(tv>=0&&col[tv].ci===j.ci&&col[tv].filled<SORT_CAP){
        col[tv].filled++;col[tv].shineT=1;col[tv].squishT=1;score+=10;
        var sx2=L.sSx+j.targetCol*(L.sBw+L.sColGap)+L.sBw/2+(j.targetSlot-1)*(L.sBw/4);
        var sy2=getSortBoxY(j.targetCol,0)+L.sBh/2;
        spawnBurst(sx2,sy2,COLORS[j.ci].fill,8);sfx.sort();
        if(col[tv].filled>=SORT_CAP){
          var cx2=L.sSx+j.targetCol*(L.sBw+L.sColGap)+L.sBw/2;
          col[tv].popT=1;score+=50;sfx.complete();
          spawnBurst(cx2,sy2,COLORS[j.ci].fill,28);
          spawnConfetti(cx2,sy2,20);
          // Starburst ring
          for(var p=0;p<12;p++){
            var a=Math.PI*2*p/12;var sp=5+Math.random()*3;
            particles.push({x:cx2,y:sy2,vx:Math.cos(a)*sp*S,vy:Math.sin(a)*sp*S,
              r:(1+Math.random()*2)*S,color:'#fff',life:1,decay:0.04,grav:false});
          }
          (function(rc,rt){setTimeout(function(){rc[rt].vis=false;checkWin();},400);})(col,tv);
        }
      }
      jumpers.splice(i,1);continue;
    }
  }
  for(var i=0;i<stock.length;i++){var b=stock[i];
    if(b.shakeT>0)b.shakeT=Math.max(0,b.shakeT-0.04);
    if(b.popT>0)b.popT=Math.max(0,b.popT-0.025);
    if(b.revealT>0)b.revealT=Math.max(0,b.revealT-0.03);
    if(b.emptyT>0)b.emptyT=Math.max(0,b.emptyT-0.025);
    // Auto-reveal: detect when a locked box becomes the bottom-most unused in its column
    if(!b.used&&!b.revealed&&!b.spawning&&b.revealT<=0){
      var col=i%L.cols;var isBottom=true;
      for(var r2=Math.floor(i/L.cols)+1;r2<L.rows;r2++){
        if(!stock[r2*L.cols+col].used){isBottom=false;break;}
      }
      if(isBottom){
        b.revealed=true;
        b.revealT=1.0;
        // Gift unwrap particles
        var bx2=b.x+L.bw/2,by2=b.y+L.bh/2;
        for(var p=0;p<16;p++){
          var a2=Math.PI*2*p/16+Math.random()*0.3;
          var sp2=3+Math.random()*5;
          var clr2=['#FFE4B5','#FFF8DC','#FAEBD7','#DEB887','#F5DEB3'][~~(Math.random()*5)];
          particles.push({x:bx2,y:by2,vx:Math.cos(a2)*sp2*S,vy:Math.sin(a2)*sp2*S,
            r:(3+Math.random()*5)*S,color:clr2,life:1,decay:0.015+Math.random()*0.015,grav:false});
        }
        sfx.pop();
      }
    }
    var th=(i===hoverIdx&&!b.used&&isBoxTappable(i))?1:0;b.hoverT+=(th-b.hoverT)*0.12;
  }
  // Physics marble spawn bounce
  for(var i=0;i<physMarbles.length;i++){
    if(physMarbles[i].spawnT>0)physMarbles[i].spawnT=Math.max(0,physMarbles[i].spawnT-0.05);
  }
  for(var c=0;c<sortCols.length;c++){var col=sortCols[c];for(var r=0;r<col.length;r++){
    if(col[r].popT>0)col[r].popT=Math.max(0,col[r].popT-0.018);
    if(col[r].shineT>0)col[r].shineT=Math.max(0,col[r].shineT-0.025);
    if(col[r].squishT>0)col[r].squishT=Math.max(0,col[r].squishT-0.06);
  }}
  // Lock button trigger check
  for(var c=0;c<sortCols.length;c++){
    var col=sortCols[c];var topVis=-1;
    for(var r=0;r<col.length;r++){if(col[r].vis){topVis=r;break;}}
    if(topVis<0)continue;
    var box=col[topVis];
    if(box.type==='lock'&&!box.triggered){
      box.triggered=true;
      box.triggerT=1.0;
      box.shineT=1;
      sfx.complete();
      // Burst particles at the lock button position
      var bx=L.sSx+c*(L.sBw+L.sColGap)+L.sBw/2;
      var by=getSortBoxY(c,0)+L.sBh/2;
      spawnBurst(bx,by,'#FFD700',20);
      spawnConfetti(bx,by,15);
      // Release all cup marbles after a short delay
      (function(boxRef,colRef,rowRef){
        setTimeout(function(){
          releaseCupMarbles();
          boxRef.popT=1;
        },300);
        setTimeout(function(){
          boxRef.vis=false;
          checkWin();
        },700);
      })(box,col,topVis);
    }
    if(box.type==='lock'&&box.triggerT>0){
      box.triggerT=Math.max(0,box.triggerT-0.03);
    }
  }
  tickParticles();
  updateRollingSound();
}
function checkWin(){
  for(var c=0;c<sortCols.length;c++)for(var r=0;r<sortCols[c].length;r++)if(sortCols[c][r].vis)return;
  if(!won){won=true;sfx.win();
    // Award stars (all levels are identical for now, always 3 stars)
    levelStars[currentLevel]=3;
    // Unlock next level
    if(currentLevel+1<LEVELS.length && unlockedLevels<=currentLevel+1){
      unlockedLevels=currentLevel+2;
    }
    // Update win message
    document.getElementById('win-msg').textContent='Level '+(currentLevel+1)+' complete!';

    setTimeout(function(){spawnConfetti(W/2,H/4,50);},600);

// === DRAW ===
function rRect(x,y,w,h,r){r=Math.min(r,w/2,h/2);ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function drawMarble(x,y,r,ci,es){
  var rs=r*(es||1)*2;
  ctx.save();
  ctx.shadowColor='rgba(0,0,0,0.3)';
  ctx.shadowBlur=rs*0.4;
  ctx.shadowOffsetX=rs*0.08;
  ctx.shadowOffsetY=rs*0.15;
  ctx.drawImage(marbleImg(ci),x-rs/2,y-rs/2,rs,rs);
  ctx.restore();
}

function drawBackground(){
  // Plain background color fills everything (side padding)
  ctx.fillStyle='#EDE5D8';
  ctx.fillRect(0,0,W,H);
  // Pick background image for current level
  var lvl=LEVELS[currentLevel];
  var bgKey='concept_bg_'+(lvl&&lvl.bg?lvl.bg:1);
  var bgImg=imgs[bgKey];
  if(!bgImg||!bgImg.naturalWidth)return;
  var imgW=bgImg.naturalWidth;
  var imgH=bgImg.naturalHeight;
  var sc=H/imgH; // fit to height
  var dw=imgW*sc;
  var dh=H;
  var dx=(W-dw)/2; // center horizontally
  L.bgScale=sc;L.bgX=dx;L.bgY=0;L.bgW=dw;L.bgH=dh;
  ctx.drawImage(bgImg,dx,0,dw,dh);
}

function drawStock(){
  for(var i=0;i<stock.length;i++){
    var b=stock[i],c=COLORS[b.ci];var ox=0;
    if(b.shakeT>0)ox=Math.sin(b.shakeT*28)*5*S*b.shakeT;

    // Idle breathing for tappable boxes
    var breathe=0;
    if(!b.used&&!b.spawning&&b.revealT<=0&&isBoxTappable(i)){
      breathe=Math.sin(tick*0.04+b.idlePhase)*0.02;
    }

    var ps=1+b.popT*0.15+breathe;
    var hs=1+b.hoverT*0.05;
    var ts=ps*hs;

    // Empty transition: shrink and fade out
    if(b.used&&b.emptyT>0){
      ts*=0.7+0.3*(1-b.emptyT);
      ctx.save();ctx.globalAlpha=1-b.emptyT*0.3;
      ctx.translate(b.x+L.bw/2+ox,b.y+L.bh/2);ctx.scale(ts,ts);
      ctx.shadowColor='rgba(0,0,0,0.15)';ctx.shadowBlur=4*S;ctx.shadowOffsetX=1*S;ctx.shadowOffsetY=2*S;
      ctx.drawImage(imgs.box_empty,-L.bw/2,-L.bh/2,L.bw,L.bh);
      ctx.restore();
      continue;
    }

    ctx.save();
    ctx.translate(b.x+L.bw/2+ox,b.y+L.bh/2);ctx.scale(ts,ts);

    // Box drop shadow
    ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=6*S;ctx.shadowOffsetX=2*S;ctx.shadowOffsetY=3*S;

    if(b.used){
      // Fully empty — static
      ctx.drawImage(imgs.box_empty,-L.bw/2,-L.bh/2,L.bw,L.bh);
    } else if(b.revealT>0){
      // === GIFT REVEAL ANIMATION ===
      var rt=b.revealT; // 1.0→0.0
      var phase=1-rt; // 0→1

      if(phase<0.5){
        // Phase 1: Gift box wobbles and shakes
        var wobble=Math.sin(phase*Math.PI*8)*(1-phase*2)*6*S;
        var squash=1+Math.sin(phase*Math.PI*4)*0.08;
        ctx.save();
        ctx.rotate(wobble*0.02);
        ctx.scale(squash,2-squash);
        ctx.drawImage(imgs.box_locked,-L.bw/2,-L.bh/2,L.bw,L.bh);
        ctx.restore();
      } else {
        // Phase 2: Crossfade to colored box with scale pop
        var t2=(phase-0.5)*2; // 0→1
        var popScale=1+Math.sin(t2*Math.PI)*0.15;
        ctx.save();
        ctx.scale(popScale,popScale);
        // Fade out gift
        if(t2<0.4){
          ctx.globalAlpha=1-t2*2.5;
          ctx.drawImage(imgs.box_locked,-L.bw/2,-L.bh/2,L.bw,L.bh);
          ctx.globalAlpha=t2*2.5;
        }
        // Colored box fades in
        ctx.drawImage(boxImg(b.ci),-L.bw/2,-L.bh/2,L.bw,L.bh);
        ctx.globalAlpha=1;
        // Draw marbles appearing
        ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
        if(b.remaining>0&&t2>0.3){
          var mAlpha=Math.min(1,(t2-0.3)/0.4);
          ctx.globalAlpha=mAlpha;
          var mr=Math.min(7*S,L.bw/8.5);var mg=Math.min(14*S,L.bw/4.2);var mgY=mg*MRB_GAP_FACTOR;
          for(var row=0;row<3;row++)for(var col2=0;col2<3;col2++){
            drawMarble((col2-1)*mg,(row-1)*mgY-2*S,mr,b.ci);
          }
          // Redraw box front lip on top of marbles for depth
          ctx.globalAlpha=1;
          ctx.save();
          var lipH2=L.bh*LIP_PCT;
          ctx.beginPath();
          ctx.rect(-L.bw/2,L.bh/2-lipH2,L.bw,lipH2);
          ctx.clip();
          ctx.drawImage(boxImg(b.ci),-L.bw/2,-L.bh/2,L.bw,L.bh);
          ctx.restore();
        }
        ctx.restore();
      }
    } else {
      if(!b.revealed){
        // Locked gift box with subtle idle wobble
        var idleWobble=Math.sin(tick*0.02+b.idlePhase)*0.008;
        ctx.rotate(idleWobble);
        ctx.drawImage(imgs.box_locked,-L.bw/2,-L.bh/2,L.bw,L.bh);
      } else {
        // Revealed colored box
        var tappable=isBoxTappable(i);
        if(tappable&&b.hoverT>0.01){ctx.shadowColor=c.glow;ctx.shadowBlur=20*S*b.hoverT;}
        ctx.drawImage(boxImg(b.ci),-L.bw/2,-L.bh/2,L.bw,L.bh);
        // Clear shadow before drawing marbles on top
        ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
        if(b.remaining>0){
          var mr=Math.min(7*S,L.bw/8.5);var mg=Math.min(14*S,L.bw/4.2);var mgY=mg*MRB_GAP_FACTOR;
          // Collect remaining marbles and sort by row so bottom rows draw last (on top for perspective)
          var gone=MRB_PER_BOX-b.remaining;
          var mrbsToDraw=[];
          for(var si2=gone;si2<MRB_PER_BOX;si2++){
            mrbsToDraw.push(SNAKE_ORDER[si2]);
          }
          mrbsToDraw.sort(function(a,b2){return a.r-b2.r;});
          for(var si2=0;si2<mrbsToDraw.length;si2++){
            var sp=mrbsToDraw[si2];
            drawMarble((sp.c-1)*mg,(sp.r-1)*mgY-2*S,mr,b.ci);
          }
          // Redraw box front lip on top of marbles for depth
          ctx.save();
          var lipH=L.bh*LIP_PCT;
          ctx.beginPath();
          ctx.rect(-L.bw/2,L.bh/2-lipH,L.bw,lipH);
          ctx.clip();
          ctx.drawImage(boxImg(b.ci),-L.bw/2,-L.bh/2,L.bw,L.bh);
          ctx.restore();
        }
      }
    }
    ctx.restore();
  }
}

function drawFunnelOverlay(){
  if(!imgs.funnel||!imgs.funnel.naturalWidth)return;
  var pad=12*S;
  ctx.drawImage(imgs.funnel,L.funnelLeft-pad,L.funnelTop-pad,(L.funnelRight-L.funnelLeft)+pad*2,L.funnelH+pad*2);
}

function drawPhysMarbles(){
  for(var i=0;i<physMarbles.length;i++){
    var m=physMarbles[i];
    if(m.inCup)continue; // drawn by drawObstacles instead
    var bounce=m.spawnT>0?(1+Math.sin(m.spawnT*Math.PI)*0.4):1;
    drawMarble(m.x,m.y,m.r,m.ci,bounce);
  }
}

function drawBelt(){
  var slotR=8*S;var slotD=slotR*2.4;
  for(var i=0;i<BELT_SLOTS;i++){
    var pos=getSlotPos(i);var slot=beltSlots[i];
    ctx.save();
    ctx.shadowColor='rgba(0,0,0,0.2)';
    ctx.shadowBlur=4*S;
    ctx.shadowOffsetX=1*S;
    ctx.shadowOffsetY=2*S;
    ctx.drawImage(imgs.belt_slot_empty,pos.x-slotD/2,pos.y-slotD/2,slotD,slotD);
    ctx.restore();
    if(slot.marble>=0){
      // Elastic bounce on arrival
      var bs=1;
      if(slot.arriveAnim>0){
        var t2=1-slot.arriveAnim;
        bs=1+Math.sin(t2*Math.PI*3)*0.3*slot.arriveAnim;
      }
      drawMarble(pos.x,pos.y,slotR*0.8*cal.marble.s,slot.marble,bs);
    }
  }
}

function drawJumpers(){
  var slotR=8*S;
  for(var i=0;i<jumpers.length;i++){
    var j=jumpers[i];var t=j.t;
    var e=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    var tx=L.sSx+j.targetCol*(L.sBw+L.sColGap)+L.sBw/2+(j.targetSlot-1)*(L.sBw/4);
    var ty=getSortBoxY(j.targetCol,0)+L.sBh/2;
    var x=j.startX+(tx-j.startX)*e;
    var y=j.startY+(ty-j.startY)*e-Math.sin(t*Math.PI)*50*S;
    // Scale pulse: bigger at peak of arc, smaller at ends
    var arcScale=1+Math.sin(t*Math.PI)*0.25;
    // Trail particles
    if(tick%3===0){
      particles.push({x:x,y:y,vx:(Math.random()-0.5)*0.5*S,vy:0.5*S,
        r:(2+Math.random()*2)*S,color:COLORS[j.ci].light,life:0.6,decay:0.04,grav:false});
    }
    drawMarble(x,y,slotR*0.8*cal.marble.s,j.ci,arcScale);
  }
}

function drawSortArea(){
  for(var c=0;c<4;c++){
    var col=sortCols[c];var x=L.sSx+c*(L.sBw+L.sColGap);
    var visibleBoxes=[];
    for(var r=0;r<col.length;r++){if(col[r].vis)visibleBoxes.push({idx:r,box:col[r]});}
    var showCount=Math.min(visibleBoxes.length,SORT_VISIBLE_ROWS);
    var hiddenCount=visibleBoxes.length-showCount;
    for(var vi=0;vi<showCount;vi++){
      var b=visibleBoxes[vi].box;var byy=getSortBoxY(c,vi);
      var ps=1+b.popT*0.25;var al=b.popT>0.6?(1-b.popT)*2.5:1;
      var sqX=1,sqY=1;
      if(b.squishT>0){
        var sq=Math.sin(b.squishT*Math.PI);
        sqX=1+sq*0.12;sqY=1-sq*0.08;
      }
      ctx.save();ctx.globalAlpha=Math.max(0,Math.min(1,al));
      ctx.translate(x+L.sBw/2,byy+L.sBh/2);ctx.scale(ps*sqX,ps*sqY);

      if(b.type==='lock'){
        // === LOCK BUTTON ===
        var isTop=(vi===0);
        var pulse=isTop?1+Math.sin(tick*0.08)*0.03:1;
        ctx.scale(pulse,pulse);

        // Button body
        ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=5*S;
        ctx.shadowOffsetX=1*S;ctx.shadowOffsetY=3*S;
        var grad=ctx.createLinearGradient(0,-L.sBh/2,0,L.sBh/2);
        if(b.triggered){
          grad.addColorStop(0,'#7BC67B');grad.addColorStop(1,'#4AA04A');
        } else if(isTop){
          grad.addColorStop(0,'#FFD966');grad.addColorStop(1,'#E8A84C');
        } else {
          grad.addColorStop(0,'#B8A898');grad.addColorStop(1,'#9A8A78');
        }
        ctx.fillStyle=grad;
        rRect(-L.sBw/2,-L.sBh/2,L.sBw,L.sBh,8*S);ctx.fill();

        // Clear shadow
        ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;

        // Shine effect
        if(b.shineT>0){ctx.fillStyle='rgba(255,255,255,'+b.shineT*0.5+')';rRect(-L.sBw/2,-L.sBh/2,L.sBw,L.sBh,8*S);ctx.fill();}

        // Inner border highlight
        ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1*S;
        rRect(-L.sBw/2+2*S,-L.sBh/2+2*S,L.sBw-4*S,L.sBh-4*S,6*S);ctx.stroke();

        // Lock icon (drawn with primitives)
        var iconS=Math.min(L.sBh*0.35,L.sBw*0.15);
        var lockX=0;var lockY=0;
        if(!b.triggered){
          // Lock body (rectangle)
          ctx.fillStyle='rgba(0,0,0,0.35)';
          rRect(lockX-iconS*0.6,lockY-iconS*0.2,iconS*1.2,iconS*0.9,2*S);ctx.fill();
          // Lock shackle (arc)
          ctx.strokeStyle='rgba(0,0,0,0.35)';ctx.lineWidth=2*S;ctx.lineCap='round';
          ctx.beginPath();
          ctx.arc(lockX,lockY-iconS*0.2,iconS*0.4,-Math.PI,0);
          ctx.stroke();
          // Keyhole
          ctx.fillStyle='rgba(255,255,255,0.4)';
          ctx.beginPath();ctx.arc(lockX,lockY+iconS*0.12,iconS*0.13,0,Math.PI*2);ctx.fill();
        } else {
          // Unlocked / check mark
          ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=3*S;ctx.lineCap='round';ctx.lineJoin='round';
          ctx.beginPath();
          ctx.moveTo(-iconS*0.5,0);
          ctx.lineTo(-iconS*0.1,iconS*0.4);
          ctx.lineTo(iconS*0.5,-iconS*0.3);
          ctx.stroke();
        }
      } else {
        // === NORMAL SORT BOX ===
        ctx.shadowColor='rgba(0,0,0,0.22)';
        ctx.shadowBlur=5*S;
        ctx.shadowOffsetX=1*S;
        ctx.shadowOffsetY=3*S;
        ctx.drawImage(sortImg(b.ci),-L.sBw/2,-L.sBh/2,L.sBw,L.sBh);
        ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
        if(b.shineT>0){ctx.fillStyle='rgba(255,255,255,'+b.shineT*0.35+')';rRect(-L.sBw/2,-L.sBh/2,L.sBw,L.sBh,8*S);ctx.fill();}
        var sp=L.sBw/4,mrr=6*S*cal.sort.s*cal.marble.s;
        for(var j2=0;j2<b.filled;j2++)drawMarble((j2-1)*sp,0,mrr,b.ci);
        for(var j2=b.filled;j2<SORT_CAP;j2++){ctx.fillStyle='rgba(255,255,255,0.08)';ctx.beginPath();ctx.arc((j2-1)*sp,0,mrr*0.55,0,Math.PI*2);ctx.fill();}
      }
      ctx.restore();
    }
    if(hiddenCount>0){
      ctx.fillStyle='rgba(120,100,80,0.5)';ctx.font=9*S+'px Fredoka';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('+'+hiddenCount+' more',x+L.sBw/2,L.sTop+showCount*(L.sBh+L.sGap)+6*S);
    }
    if(visibleBoxes.length>0){
      var topBox=visibleBoxes[0].box;
      if(topBox.type==='lock'){
        ctx.fillStyle='rgba(200,170,80,0.5)';
      } else {
        var ac=COLORS[topBox.ci];ctx.fillStyle=ac.fill+'60';
      }
      var ax=x+L.sBw/2,ay=L.sTop-4*S;
      ctx.beginPath();ctx.moveTo(ax-5*S,ay-4*S);ctx.lineTo(ax+5*S,ay-4*S);ctx.lineTo(ax,ay+3*S);ctx.closePath();ctx.fill();
    }
  }
}

function drawObstacles(){
  for(var i=0;i<obstacles.length;i++){
    var ob=obstacles[i];
    if(ob.type==='cup'){
      if(ob.released)continue;
      var hw=ob.w/2;
      var left=ob.x-hw;var right=ob.x+hw;
      var top=ob.y;var bot=ob.y+ob.h;
      var wt=ob.wallThick;
      var cornerR=5*S;
      var taper=4*S;

      ctx.save();

      // Track rail
      var trackLeft=ob.trackCx-ob.trackHalfW-hw;
      var trackRight=ob.trackCx+ob.trackHalfW+hw;
      ctx.strokeStyle='rgba(120,90,60,0.25)';
      ctx.lineWidth=3*S;
      ctx.setLineDash([4*S,4*S]);
      ctx.beginPath();
      ctx.moveTo(trackLeft,top+ob.h*0.5);
      ctx.lineTo(trackRight,top+ob.h*0.5);
      ctx.stroke();
      ctx.setLineDash([]);

      // Cup shadow
      ctx.shadowColor='rgba(0,0,0,0.3)';
      ctx.shadowBlur=8*S;
      ctx.shadowOffsetX=2*S;
      ctx.shadowOffsetY=4*S;

      // Cup body
      ctx.fillStyle='#C4724E';
      ctx.beginPath();
      ctx.moveTo(left-taper,top);
      ctx.lineTo(left,bot-cornerR);
      ctx.quadraticCurveTo(left,bot,left+cornerR,bot);
      ctx.lineTo(right-cornerR,bot);
      ctx.quadraticCurveTo(right,bot,right,bot-cornerR);
      ctx.lineTo(right+taper,top);
      ctx.closePath();
      ctx.fill();

      // Clear shadow
      ctx.shadowColor='transparent';ctx.shadowBlur=0;
      ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;

      // Inner darker area
      var inset=wt;
      ctx.fillStyle='rgba(80,40,20,0.35)';
      ctx.beginPath();
      ctx.moveTo(left+inset-taper*0.6,top);
      ctx.lineTo(left+inset,bot-cornerR);
      ctx.quadraticCurveTo(left+inset,bot-inset+2*S,left+inset+cornerR,bot-inset+2*S);
      ctx.lineTo(right-inset-cornerR,bot-inset+2*S);
      ctx.quadraticCurveTo(right-inset,bot-inset+2*S,right-inset,bot-cornerR);
      ctx.lineTo(right-inset+taper*0.6,top);
      ctx.closePath();
      ctx.fill();

      // Rim highlight
      ctx.strokeStyle='rgba(255,200,150,0.5)';
      ctx.lineWidth=2*S;
      ctx.beginPath();
      ctx.moveTo(left-taper,top);
      ctx.lineTo(right+taper,top);
      ctx.stroke();

      // Horizontal band
      var bandY=top+(bot-top)*0.35;
      ctx.strokeStyle='rgba(180,100,60,0.4)';
      ctx.lineWidth=2*S;
      ctx.beginPath();
      var bandLeftX=left+(bandY-top)/(bot-top)*taper*0.5;
      var bandRightX=right-(bandY-top)/(bot-top)*taper*0.5+taper;
      ctx.moveTo(bandLeftX,bandY);
      ctx.lineTo(bandRightX,bandY);
      ctx.stroke();

      // Trapped marbles
      for(var j=0;j<ob.trapped.length;j++){
        var m=ob.trapped[j];
        drawMarble(m.x,m.y,m.r,m.ci);
      }

      ctx.restore();
    }
    if(ob.type==='gate'){
      ctx.save();
      var px=ob.pivotX,py=ob.pivotY;
      // Arm hangs DOWN: angle=0 is straight down, neg=left, pos=right
      var endX=px+Math.sin(ob.angle)*ob.barLen;
      var endY=py+Math.cos(ob.angle)*ob.barLen;
      var barW=6*S;

      // Bar shadow
      ctx.shadowColor='rgba(0,0,0,0.3)';
      ctx.shadowBlur=6*S;
      ctx.shadowOffsetX=1*S;
      ctx.shadowOffsetY=3*S;

      // Bar body — rounded thick line
      ctx.strokeStyle='#A08060';
      ctx.lineWidth=barW;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(px,py);
      ctx.lineTo(endX,endY);
      ctx.stroke();

      // Bar highlight stripe
      ctx.shadowColor='transparent';ctx.shadowBlur=0;
      ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;
      ctx.strokeStyle='rgba(255,255,255,0.2)';
      ctx.lineWidth=2*S;
      ctx.beginPath();
      ctx.moveTo(px,py);
      ctx.lineTo(endX,endY);
      ctx.stroke();

      // Pivot hub — outer ring
      var hubR=10*S;
      ctx.shadowColor='rgba(0,0,0,0.25)';ctx.shadowBlur=4*S;
      ctx.shadowOffsetY=2*S;
      ctx.fillStyle='#8B7355';
      ctx.beginPath();ctx.arc(px,py,hubR,0,Math.PI*2);ctx.fill();
      ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetY=0;

      // Inner hub
      ctx.fillStyle='#A08060';
      ctx.beginPath();ctx.arc(px,py,hubR*0.65,0,Math.PI*2);ctx.fill();

      // Hub highlight
      ctx.fillStyle='rgba(255,255,255,0.2)';
      ctx.beginPath();ctx.arc(px-hubR*0.15,py-hubR*0.2,hubR*0.3,0,Math.PI*2);ctx.fill();

      // Counter dots ABOVE pivot
      var dotR=3.5*S;
      var dotSpacing=10*S;
      var dotsStartX=px-((ob.triggerCount-1)*dotSpacing)/2;
      var dotsY=py-hubR-12*S;

      // Feedback ring on switch
      if(ob.switchT>0){
        var ringAlpha=ob.switchT*0.6;
        var ringR=hubR+20*S*(1-ob.switchT);
        ctx.strokeStyle='rgba(255,215,0,'+ringAlpha+')';
        ctx.lineWidth=3*S*ob.switchT;
        ctx.beginPath();ctx.arc(px,py,ringR,0,Math.PI*2);ctx.stroke();
      }

      for(var d=0;d<ob.triggerCount;d++){
        var dx2=dotsStartX+d*dotSpacing;
        var isFilled=(d<ob.counter);

        if(isFilled){
          ctx.fillStyle='#FFD966';
          ctx.shadowColor='rgba(255,217,102,0.4)';ctx.shadowBlur=4*S;
          ctx.beginPath();ctx.arc(dx2,dotsY,dotR,0,Math.PI*2);ctx.fill();
          ctx.shadowColor='transparent';ctx.shadowBlur=0;
          ctx.fillStyle='rgba(255,255,255,0.4)';
          ctx.beginPath();ctx.arc(dx2-dotR*0.2,dotsY-dotR*0.25,dotR*0.35,0,Math.PI*2);ctx.fill();
        } else {
          ctx.fillStyle='rgba(120,100,80,0.2)';
          ctx.beginPath();ctx.arc(dx2,dotsY,dotR,0,Math.PI*2);ctx.fill();
          ctx.strokeStyle='rgba(120,100,80,0.35)';
          ctx.lineWidth=1.5*S;
          ctx.beginPath();ctx.arc(dx2,dotsY,dotR,0,Math.PI*2);ctx.stroke();
        }
      }

      // Direction arrow hint near dots
      var arrowX=px+(ob.side<0?-1:1)*(((ob.triggerCount-1)*dotSpacing)/2+16*S);
      var arrowY=dotsY;
      var arrowDir=ob.side<0?1:-1;
      ctx.fillStyle='rgba(120,100,80,0.3)';
      ctx.beginPath();
      ctx.moveTo(arrowX,arrowY-4*S);
      ctx.lineTo(arrowX+arrowDir*6*S,arrowY);
      ctx.lineTo(arrowX,arrowY+4*S);
      ctx.closePath();
      ctx.fill();

      ctx.restore();
    }
    if(ob.type==='trapdoor'){
      for(var ci=0;ci<ob.cups.length;ci++){
        var cup=ob.cups[ci];
        var hw=cup.w/2;
        var left=cup.x-hw;var right=cup.x+hw;
        var top2=cup.y;var bot2=cup.y+cup.h;
        var wt=cup.wallThick;
        var cornerR=5*S;
        var taper=4*S;

        ctx.save();

        // Cup shadow
        ctx.shadowColor='rgba(0,0,0,0.3)';
        ctx.shadowBlur=8*S;
        ctx.shadowOffsetX=2*S;
        ctx.shadowOffsetY=4*S;

        // Cup color based on state — closed=terracotta, open=muted/dark
        var bodyColor=cup.open?'#8B6B50':'#C4724E';
        var rimColor=cup.open?'rgba(180,150,120,0.3)':'rgba(255,200,150,0.5)';

        // Cup body (left wall, bottom, right wall)
        ctx.fillStyle=bodyColor;
        ctx.beginPath();
        ctx.moveTo(left-taper,top2);
        ctx.lineTo(left,bot2-cornerR);
        ctx.quadraticCurveTo(left,bot2,left+cornerR,bot2);
        // Bottom — splits open when openT > 0
        var split=cup.openT*hw*0.8;
        if(cup.openT<0.05){
          // Fully closed — solid bottom
          ctx.lineTo(right-cornerR,bot2);
        } else {
          // Bottom opening: draw left half, gap, right half
          ctx.lineTo(cup.x-split,bot2);
          ctx.moveTo(cup.x+split,bot2);
          ctx.lineTo(right-cornerR,bot2);
        }
        ctx.quadraticCurveTo(right,bot2,right,bot2-cornerR);
        ctx.lineTo(right+taper,top2);
        ctx.closePath();
        ctx.fill();

        // Clear shadow
        ctx.shadowColor='transparent';ctx.shadowBlur=0;
        ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;

        // Inner darker area
        var inset=wt;
        ctx.fillStyle='rgba(80,40,20,0.35)';
        ctx.beginPath();
        ctx.moveTo(left+inset-taper*0.6,top2);
        ctx.lineTo(left+inset,bot2-cornerR);
        ctx.quadraticCurveTo(left+inset,bot2-inset+2*S,left+inset+cornerR,bot2-inset+2*S);
        ctx.lineTo(right-inset-cornerR,bot2-inset+2*S);
        ctx.quadraticCurveTo(right-inset,bot2-inset+2*S,right-inset,bot2-cornerR);
        ctx.lineTo(right-inset+taper*0.6,top2);
        ctx.closePath();
        ctx.fill();

        // Rim highlight
        ctx.strokeStyle=rimColor;
        ctx.lineWidth=2*S;
        ctx.beginPath();
        ctx.moveTo(left-taper,top2);
        ctx.lineTo(right+taper,top2);
        ctx.stroke();

        // Horizontal band
        var bandY=top2+(bot2-top2)*0.35;
        ctx.strokeStyle='rgba(180,100,60,0.4)';
        ctx.lineWidth=2*S;
        ctx.beginPath();
        var bandLeftX=left+(bandY-top2)/(bot2-top2)*taper*0.5;
        var bandRightX=right-(bandY-top2)/(bot2-top2)*taper*0.5+taper;
        ctx.moveTo(bandLeftX,bandY);
        ctx.lineTo(bandRightX,bandY);
        ctx.stroke();

        // Open/closed indicator icon
        var iconY=top2-12*S;
        var iconX=cup.x;
        if(cup.open){
          // Open arrow (down)
          ctx.fillStyle='rgba(100,200,100,0.7)';
          ctx.beginPath();
          ctx.moveTo(iconX-6*S,iconY-3*S);
          ctx.lineTo(iconX+6*S,iconY-3*S);
          ctx.lineTo(iconX,iconY+5*S);
          ctx.closePath();
          ctx.fill();
        } else {
          // Closed bar
          ctx.fillStyle='rgba(200,100,80,0.7)';
          rRect(iconX-8*S,iconY-2*S,16*S,4*S,2*S);
          ctx.fill();
        }

        // Timer progress arc above cup
        var progress=(ob.timer%ob.interval)/ob.interval;
        // For left cup: fill while closed (first half), for right: fill while closed (second half)
        var cupProgress;
        if(cup.side==='left'){
          cupProgress=cup.open?0:(1-(ob.timer%Math.floor(ob.interval/2))/(ob.interval/2));
        } else {
          cupProgress=cup.open?0:(1-(ob.timer%Math.floor(ob.interval/2))/(ob.interval/2));
        }
        var arcR=5*S;
        var arcX=iconX;
        var arcY=iconY-10*S;
        ctx.strokeStyle='rgba(120,100,80,0.2)';
        ctx.lineWidth=2.5*S;
        ctx.beginPath();ctx.arc(arcX,arcY,arcR,0,Math.PI*2);ctx.stroke();
        if(!cup.open){
          ctx.strokeStyle='rgba(232,168,76,0.8)';
          ctx.lineWidth=2.5*S;
          ctx.beginPath();
          ctx.arc(arcX,arcY,arcR,-Math.PI/2,-Math.PI/2+cupProgress*Math.PI*2);
          ctx.stroke();
        }

        // Trapped marbles (draw on top)
        for(var mj=0;mj<cup.trapped.length;mj++){
          var m=cup.trapped[mj];
          drawMarble(m.x,m.y,m.r,m.ci);
        }

        ctx.restore();
      }
    }
  }
}

function drawDebugWalls(){
  if(!calVisible)return;
  ctx.strokeStyle='rgba(255,0,0,0.4)';ctx.lineWidth=2;
  for(var w=0;w<funnelWalls.length;w++){var wall=funnelWalls[w];
    ctx.beginPath();ctx.moveTo(wall.x1,wall.y1);ctx.lineTo(wall.x2,wall.y2);ctx.stroke();}
  ctx.strokeStyle='rgba(0,100,255,0.3)';ctx.lineWidth=1;
  ctx.beginPath();
  for(var i=0;i<beltPath.length;i++){if(i===0)ctx.moveTo(beltPath[i].x,beltPath[i].y);else ctx.lineTo(beltPath[i].x,beltPath[i].y);}
  ctx.closePath();ctx.stroke();
  // Sort area outline
  ctx.strokeStyle='rgba(0,180,0,0.3)';ctx.lineWidth=1;
  for(var c=0;c<4;c++){
    var x=L.sSx+c*(L.sBw+L.sColGap);
    ctx.strokeRect(x,L.sTop,L.sBw,SORT_VISIBLE_ROWS*(L.sBh+L.sGap));
  }
  // Obstacle walls
  var obWalls=getObstacleWalls();
  ctx.strokeStyle='rgba(200,100,0,0.5)';ctx.lineWidth=2;
  for(var w=0;w<obWalls.length;w++){var wall=obWalls[w];
    ctx.beginPath();ctx.moveTo(wall.x1,wall.y1);ctx.lineTo(wall.x2,wall.y2);ctx.stroke();}
}

function frame(){
  if(gameActive){
    update();ctx.clearRect(0,0,W,H);
    drawBackground();
    drawStock();
    drawPhysMarbles();
    drawFunnelOverlay();
    drawObstacles();
    drawBelt();
    drawJumpers();
    drawSortArea();
    drawParticles();
    drawDebugWalls();
  }
  requestAnimationFrame(frame);
}
function restartGame(){initGame();}
loadImages(function(){
  resize();
  showLevelSelect();
  frame();
});

</script>
